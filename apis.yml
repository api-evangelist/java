aid: java
name: Java
description: >-
  Java is a high-level, class-based, object-oriented programming language
  developed by Sun Microsystems (now Oracle). The Java Standard Edition (SE)
  platform provides a comprehensive set of APIs and class libraries for
  building cross-platform applications. Key APIs include Collections,
  Concurrency, I/O, Networking, JDBC, Reflection, and Streams.
